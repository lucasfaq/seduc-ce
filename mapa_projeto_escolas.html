    <style>
      .togglebox{
        position: fixed; top: 12px; left: 12px; z-index: 99999;
        background: white; padding: 10px 12px; border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0,0,0,.12);
        font-family: Arial, sans-serif; font-size: 13px;
        min-width: 240px;
      }
      .togglebox .title{font-weight:800; margin-bottom:8px;}
      .togglebox .row{display:flex; gap:6px; flex-wrap:wrap;}
      .togglebox button{
        border: 1px solid #d1d5db; background: #f9fafb;
        padding: 6px 10px; border-radius: 8px; cursor: pointer;
        font-weight:800;
      }
      .togglebox button.active{background:#111827;color:white;border-color:#111827;}
      .togglebox .hint{margin-top:8px;color:#4b5563;font-size:12px;}
    </style>
    
    <div class="togglebox">
      <div class="title">Modo de Cores</div>
      <div class="row">
        <button id="btnDesc" class="active" onclick="setMode('desc')">Descrição</button>
        <button id="btnPri" onclick="setMode('pri')">Prioridade</button>
        <button id="btnSt" onclick="setMode('status')">Status Obra</button>
      </div>
      <div class="hint">Trocar o modo reseta os filtros das camadas anteriores.</div>
    </div>
    
    <script>
    function getMap(){
      if (window._folium_map) return window._folium_map;
      for (const k in window){
        if (window[k] && window[k] instanceof L.Map){
          window._folium_map = window[k];
          return window._folium_map;
        }
      }
      return null;
    }

    function isDescName(name){ return name.startsWith("[Descrição]"); }
    function isPriName(name){ return name.startsWith("[Prioridade]"); }
    function isStName(name){ return name.startsWith("[StatusObra]"); }

    function belongsToMode(name, mode){
      if(mode==='desc') return isDescName(name);
      if(mode==='pri') return isPriName(name);
      if(mode==='status') return isStName(name);
      return false;
    }

    function showHideLayerControlItems(mode){
      const control = document.querySelector('.leaflet-control-layers-overlays');
      if (!control) return;
      const labels = control.querySelectorAll('label');
      labels.forEach(lbl => {
        const txt = (lbl.textContent || "").trim();
        lbl.style.display = belongsToMode(txt, mode) ? '' : 'none';
      });
    }

    function uncheckOtherModes(mode){
      const control = document.querySelector('.leaflet-control-layers-overlays');
      if (!control) return;
      const labels = control.querySelectorAll('label');

      labels.forEach(lbl => {
        const txt = (lbl.textContent || "").trim();
        const input = lbl.querySelector('input[type="checkbox"]');
        if(!input) return;
        if(!belongsToMode(txt, mode) && input.checked){
          input.click();
        }
      });
    }

    function checkAllInMode(mode){
      const control = document.querySelector('.leaflet-control-layers-overlays');
      if (!control) return;
      const labels = control.querySelectorAll('label');

      labels.forEach(lbl => {
        const txt = (lbl.textContent || "").trim();
        const input = lbl.querySelector('input[type="checkbox"]');
        if(!input) return;
        if(belongsToMode(txt, mode) && !input.checked){
          input.click();
        }
      });
    }

    function setButtons(mode){
      ["btnDesc","btnPri","btnSt"].forEach(id => document.getElementById(id).classList.remove("active"));
      if(mode==='desc') document.getElementById("btnDesc").classList.add("active");
      if(mode==='pri') document.getElementById("btnPri").classList.add("active");
      if(mode==='status') document.getElementById("btnSt").classList.add("active");
    }

    function setMode(mode){
      uncheckOtherModes(mode);
      checkAllInMode(mode);
      setButtons(mode);
      showHideLayerControlItems(mode);
    }

    window.addEventListener("load", function(){
      setMode('desc');
    });
    </script>
